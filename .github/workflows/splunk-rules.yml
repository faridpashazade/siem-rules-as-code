name: Splunk Rules Pipeline

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  validate:
    name: Validate Splunk Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate Splunk rule files
        run: python scripts/validate_rules.py

  deploy:
    name: Deploy Splunk Rules
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy Splunk saved searches
        env:
          SPLUNK_URL: ${{ secrets.SPLUNK_URL }}
          SPLUNK_TOKEN: ${{ secrets.SPLUNK_TOKEN }}
          SPLUNK_AUTH_SCHEME: ${{ secrets.SPLUNK_AUTH_SCHEME }}
          SPLUNK_APP: ${{ secrets.SPLUNK_APP }}
          SPLUNK_OWNER: ${{ secrets.SPLUNK_OWNER }}
          SPLUNK_VERIFY_SSL: ${{ secrets.SPLUNK_VERIFY_SSL }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
        run: python scripts/deploy_splunk.py
