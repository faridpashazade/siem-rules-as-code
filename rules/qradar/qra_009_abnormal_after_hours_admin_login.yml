id: QRA-009
name: Abnormal After-Hours Admin Login
description: "Detects privileged account logins outside business hours."
enabled: true
severity: high

tags:
  - qradar
  - windows
  - privileged-account
  - after-hours
  - suspicious-login
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: username
  rule_group: GitHub Detection Rules
  log_source_type: Microsoft Windows Security Event Log

  event_ids:
    - 4624

  qids: []

  monitored_accounts:
    - administrator
    - admin
    - domain admin
    - serviceadmin

  business_hours:
    start: "08:00"
    end: "18:00"
    timezone: "local"

  qradar_rule_logic: |
    Apply this rule when a successful login is observed for an administrator or privileged account outside business hours.
    This can indicate unauthorized access or compromised credentials.

  rule_response: |
    Create an offense.
    Add the event to the offense.
    Index the offense by Username.
    Set severity to High.

mitre:
  tactics:
    - Initial Access
    - Privilege Escalation
  techniques:
    - T1078

false_positives:
  - Approved emergency maintenance
  - On-call administrator activity
  - Scheduled weekend maintenance

test_steps:
  - Perform a test admin login outside business hours.
  - Confirm successful login event appears in QRadar.
  - Confirm QRadar creates an offense.
