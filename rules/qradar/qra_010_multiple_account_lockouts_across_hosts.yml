id: QRA-010
name: Multiple Account Lockouts Across Hosts
description: "Detects multiple account lockouts across different hosts, which may indicate credential stuffing or widespread password spraying."
enabled: true
severity: high

tags:
  - qradar
  - windows
  - account-lockout
  - credential-stuffing
  - password-spraying
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: source_ip
  rule_group: GitHub Detection Rules
  log_source_type: Microsoft Windows Security Event Log

  event_ids:
    - 4740

  qids: []

  threshold:
    count: 5
    time_window: 10 minutes
    group_by:
      - source_ip

  qradar_rule_logic: |
    Apply this rule when multiple account lockout events are observed across hosts or accounts within a short time window.
    This behavior may indicate credential stuffing, password spraying, or automated authentication abuse.

  rule_response: |
    Create an offense.
    Add all matching events to the offense.
    Index the offense by Source IP.
    Set severity to High.

mitre:
  tactics:
    - Credential Access
  techniques:
    - T1110.003

false_positives:
  - Users repeatedly entering wrong passwords
  - Expired passwords
  - Misconfigured applications or services
  - Domain password policy changes

test_steps:
  - Generate repeated account lockout events in a controlled environment.
  - Confirm lockout events appear in QRadar.
  - Confirm QRadar creates an offense.
