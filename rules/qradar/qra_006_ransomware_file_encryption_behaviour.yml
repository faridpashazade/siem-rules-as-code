id: QRA-006
name: Ransomware File Encryption Behaviour
description: "Detects ransomware-like behavior based on mass file modification, suspicious extensions, or rapid file encryption activity."
enabled: true
severity: critical

tags:
  - qradar
  - windows
  - ransomware
  - file-encryption
  - impact
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: source_ip
  rule_group: GitHub Detection Rules
  log_source_type: Microsoft Windows Security Event Log

  event_ids:
    - 4663
    - 4656
    - 11

  qids:
    - 5002935
    - 5002269
    - 5000207
    - 5000206
    - 5000847
    - 5001162
    - 5003533
    - 5001830
    - 5001834

  indicators:
    - mass file modification
    - suspicious file extensions
    - rapid rename activity
    - access to many documents in short time
    - shadow copy deletion indicators

  suspicious_extensions:
    - .locked
    - .encrypted
    - .crypt
    - .ryk
    - .wannacry
    - .lockbit

  threshold:
    count: 50
    time_window: 5 minutes
    group_by:
      - source_ip

  qradar_rule_logic: |
    Apply Ransomware File Encryption Behaviour on events which are detected by the Local system
    and when the event QID is one of the following:
    5002935 An attempt was made to access an object,
    5002269 An Object Was Deleted,
    5000207 Object Deleted,
    5000206 Object Open for Delete,
    5000847 Success Audit: An object was deleted,
    5001162 Success Audit: An object was deleted from the COM+ Catalog,
    5003533 Success: An object was deleted,
    5001830 FileCreate,
    5001834 FileCreateStreamHash
    and when the Event Payload contains .locked OR .encrypted OR .crypt OR .crypto OR .ryk OR .wannacry OR .lockbit OR .blackcat OR .conti OR .revil OR .onion OR ransom OR decrypt OR recovery
    and when at least 50 events are seen with the same Source IP in 5 minutes.

  rule_response: |
    Create an offense.
    Add all matching events to the offense.
    Index the offense by Source IP.
    Set severity to Critical.

mitre:
  tactics:
    - Impact
  techniques:
    - T1486

false_positives:
  - Backup software
  - File migration tools
  - Bulk document processing
  - Antivirus quarantine activity

test_steps:
  - Generate controlled bulk file modification events.
  - Confirm QRadar receives file access or Sysmon file creation events.
  - Confirm offense creation when threshold is met.
