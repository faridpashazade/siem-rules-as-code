id: QRA-007
name: DNS Tunneling / Exfiltration Attempt
description: "Detects possible DNS tunneling or data exfiltration using high-volume or abnormal DNS query behavior."
enabled: true
severity: high

tags:
  - qradar
  - dns
  - exfiltration
  - tunneling
  - command-and-control
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: source_ip
  rule_group: GitHub Detection Rules
  log_source_type: DNS

  event_ids: []

  qids: []

  indicators:
    - high number of DNS queries
    - long domain names
    - high entropy subdomains
    - repeated TXT queries
    - repeated NXDOMAIN responses

  threshold:
    count: 100
    time_window: 10 minutes
    group_by:
      - source_ip

  qradar_rule_logic: |
    Apply this rule when a host generates an abnormal number of DNS queries in a short time window,
    especially long or suspicious subdomains that may indicate DNS tunneling or exfiltration.

  rule_response: |
    Create an offense.
    Add matching DNS events to the offense.
    Index the offense by Source IP.
    Set severity to High.

mitre:
  tactics:
    - Exfiltration
    - Command and Control
  techniques:
    - T1048
    - T1071.004

false_positives:
  - DNS monitoring tools
  - Misconfigured applications
  - Proxy or gateway DNS forwarding
  - Internal vulnerability scanners

test_steps:
  - Generate repeated DNS queries from a test host.
  - Confirm DNS events appear in QRadar Log Activity.
  - Confirm offense creation when the threshold is exceeded.
