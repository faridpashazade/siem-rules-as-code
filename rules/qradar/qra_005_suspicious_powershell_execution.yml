id: QRA-005
name: Suspicious PowerShell Execution
description: "Detects encoded, obfuscated, remote download, or suspicious PowerShell command execution."
enabled: true
severity: high

tags:
  - qradar
  - windows
  - powershell
  - execution
  - obfuscation
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: username
  rule_group: GitHub Detection Rules
  log_source_type: Microsoft Windows Security Event Log

  event_ids:
    - 4104
    - 4688

  qids:
    - 5002305
    - 5002304
    - 5001993
    - 5001992
    - 5002310
    - 5003189
    - 5003188
    - 5002307

  suspicious_keywords:
    - EncodedCommand
    - FromBase64String
    - Invoke-Expression
    - IEX
    - DownloadString
    - Net.WebClient
    - Invoke-WebRequest
    - Start-BitsTransfer
    - bypass
    - hidden
    - noprofile

  qradar_rule_logic: |
    Apply Suspicious PowerShell Execution on events which are detected by the Local system
    and when the event QID is one of the following:
    5002305 PowerShell console is ready for user input,
    5002304 PowerShell console is starting up,
    5001993 PowerShell Console Ready,
    5001992 PowerShell Console Started,
    5002310 PowerShell encountered an error,
    5003189 PowerShell Script Execution End,
    5003188 PowerShell Script Execution Start,
    5002307 PowerShell Started an IPC
    and when the Event Payload contains EncodedCommand OR FromBase64String OR Invoke-Expression OR IEX OR DownloadString OR Net.WebClient OR Invoke-WebRequest OR Start-BitsTransfer OR bypass OR hidden OR noprofile.

  rule_response: |
    Create an offense.
    Add the event to the offense.
    Index the offense by Username.
    Set severity to High.

  analyst_note: |
    This rule detects suspicious PowerShell execution patterns such as encoded commands,
    obfuscation, remote download commands, and PowerShell execution bypass indicators.

mitre:
  tactics:
    - Execution
    - Defense Evasion
  techniques:
    - T1059.001
    - T1027

false_positives:
  - Administrative PowerShell scripts
  - Security tools
  - Software deployment automation
  - System administration activity

test_steps:
  - Run a benign encoded PowerShell test command.
  - Confirm matching PowerShell QIDs appear in QRadar Log Activity.
  - Confirm QRadar creates an offense when suspicious payload keywords are observed.
