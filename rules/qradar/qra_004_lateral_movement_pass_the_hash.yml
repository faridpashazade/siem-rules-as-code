id: QRA-004
name: Lateral Movement via Pass-the-Hash
description: "Detects possible pass-the-hash lateral movement using NTLM authentication patterns across multiple hosts."
enabled: true
severity: critical

tags:
  - qradar
  - windows
  - active-directory
  - lateral-movement
  - pass-the-hash
  - ntlm
  - offense-rule

qradar:
  rule_type: EVENT
  offense: true
  offense_index: source_ip
  rule_group: GitHub Detection Rules
  log_source_type: Microsoft Windows Security Event Log

  event_ids:
    - 4624
    - 4627
    - 4776

  qids:
  - 5003347
  - 5003081
  - 5002186

  indicators:
    - NTLM authentication
    - Logon Type 3
    - same account used across multiple destination hosts
    - short time window authentication bursts

  threshold:
    count: 3
    time_window: 10 minutes
    group_by:
      - source_ip

  qradar_rule_logic: |
    Apply Lateral Movement via Pass-the-Hash on events which are detected by the Local system
    and when the event QID is one of the following:
    5003347 NTLM Authentication Failed,
    5003081 NTLM authentication failed because access control restrictions are required,
    5002186 The computer attempted to validate the credentials for an account
    and when at least 3 events are seen with the same Source IP in 10 minutes.
  rule_response: |
    Create an offense.
    Add all matching events to the offense.
    Index the offense by Source IP.
    Set severity to Critical.

mitre:
  tactics:
    - Lateral Movement
  techniques:
    - T1550.002

false_positives:
  - Administrative remote management
  - Vulnerability scanning with domain credentials
  - Software deployment tools

test_steps:
  - Identify NTLM logon events in QRadar.
  - Build the QRadar Custom Rule using the matching QIDs from Log Activity.
  - Confirm offense creation when the same account authenticates to multiple hosts.
