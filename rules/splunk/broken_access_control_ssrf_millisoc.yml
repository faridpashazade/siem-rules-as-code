id: SPL-002
name: Broken Access Control and SSRF Attempts - millisoc.tech
description: Detects suspicious web requests targeting sensitive paths, dangerous HTTP methods, and possible SSRF attempts against millisoc.tech.
enabled: true
severity: high

tags:
  - web
  - splunk
  - ssrf
  - broken-access-control
  - millisoc.tech

mitre:
  tactics:
    - Initial Access
    - Discovery
  techniques:
    - T1190

splunk:
  app: search
  owner: nobody

  search: |
    index="*" 
    | spath host 
    | search host="millisoc.tech"
    | rex field=_raw "(?<clientip>\d{1,3}(?:\.\d{1,3}){3})"
    | rex field=_raw "\"(?<method>GET|POST|PUT|DELETE|HEAD|OPTIONS|PATCH)\s+(?<uri>[^\s\"]+)"
    | rex field=_raw "\"\s+(?<status>\d{3})\s+"
    | eval method=upper(method)
    | eval uri=lower(uri)
    | eval status=tonumber(status)
    | search (
        (
            uri="/admin*" OR uri="/config*" OR uri="/setup*" OR uri="/dashboard*" OR
            uri="/manage*" OR uri="/control*" OR uri="/panel*" OR uri="/root*" OR
            uri="/debug*" OR uri="/register*" OR uri="/db*" OR uri="*server*" OR
            uri="*admin_check*" OR uri="*login*" OR uri="*license*" OR uri="*cname*" OR
            method="PUT" OR method="DELETE" OR method="HEAD"
        )
        OR
        (
            uri="*http://127.0.0.1*" OR uri="*http://localhost*" OR uri="*http://169.254.169.254*" OR
            uri="*http://169.254.*" OR uri="*http://0.0.0.0*" OR uri="*http://192.168.*" OR
            uri="*http://10.*"
        )
    )
    | search status=400 OR status=401 OR status=403 OR status=404 OR status=500
    | eval attack_type=case(
        like(uri,"%http://127.0.0.1%") OR like(uri,"%http://localhost%") OR like(uri,"%http://169.254.169.254%") OR like(uri,"%http://169.254.%") OR like(uri,"%http://0.0.0.0%") OR like(uri,"%http://192.168.%") OR like(uri,"%http://10.%"), "SSRF",
        like(uri,"/admin%") OR like(uri,"/config%") OR like(uri,"/setup%") OR like(uri,"/dashboard%") OR like(uri,"/manage%") OR like(uri,"/control%") OR like(uri,"/panel%") OR like(uri,"/root%") OR like(uri,"/debug%") OR like(uri,"/register%") OR like(uri,"/db%") OR like(uri,"%server%") OR like(uri,"%admin_check%") OR like(uri,"%login%") OR like(uri,"%license%") OR like(uri,"%cname%") OR method="PUT" OR method="DELETE" OR method="HEAD", "Broken Access Control",
        true(), "Unknown"
    )
    | eventstats count as count by _time clientip uri method status attack_type
    | table _time clientip uri method status count attack_type _raw
    | rename _raw as "Source Log"
    | sort - count

  cron_schedule: "0 * * * *"
  earliest_time: "-24h"
  latest_time: "now"

  alert_type: "number of events"
  alert_comparator: "greater than"
  alert_threshold: 0

  actions:
    email: false
    notable: false

risk:
  object: clientip
  object_type: ip
  score: 70

false_positives:
  - Internal vulnerability scanners
  - Web application health checks
  - Admin panel testing by authorized users
  - Development or staging traffic

references:
  - https://attack.mitre.org/techniques/T1190/
